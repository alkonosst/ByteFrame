name=ByteFrame
version=0.2.0
author=Maximiliano Ramirez <maximiliano.ramirezbravo@gmail.com>
maintainer=Maximiliano Ramirez <maximiliano.ramirezbravo@gmail.com>
sentence=Header-only frame delimiting library with zero dynamic memory allocation.
paragraph=Delimits packets over raw byte streams (UART, RS-485, radios, TCP) using COBS encoding, a selectable CRC (none, CRC8, CRC16 or CRC32) integrity check and a single 0x00 delimiter. Includes a compile-time worst-case size helper (getMaxEncodedSize) and an incremental fixed-buffer Decoder with per-cause error counters. Pairs naturally with BytePack for type-safe payloads.
category=Communication
url=https://github.com/alkonosst/ByteFrame/
architectures=*
includes=ByteFrame.h
